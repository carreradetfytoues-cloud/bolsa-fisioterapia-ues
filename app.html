<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsa de Trabajo e Ingreso de Datos - UES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <!-- Header -->
    <header class="bg-indigo-600 text-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex flex-col text-center md:text-left">
                <h1 class="text-xl md:text-2xl font-bold tracking-tight leading-tight max-w-2xl">
                    Plataforma de Datos y Directorio Profesional
                </h1>
                <span class="text-indigo-200 text-xs mt-1 font-medium">Universidad de El Salvador</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="index.html" class="bg-indigo-700 hover:bg-indigo-800 text-white text-xs font-semibold px-4 py-2 rounded-lg transition duration-200">
                    ← Volver al Inicio
                </a>
                <div class="bg-white p-1 rounded-full shadow-sm flex items-center justify-center w-12 h-12">
                    <img src="logo_ues.png" alt="Logo UES" class="w-10 h-10 object-contain rounded-full">
                </div>
                <div class="bg-white p-1 rounded-full shadow-sm flex items-center justify-center w-12 h-12">
                    <img src="logo_fisioterapia.jpg" alt="Logo Fisioterapia" class="w-10 h-10 object-contain rounded-full">
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- COLUMNA IZQUIERDA: AUTH Y EDICIÓN -->
        <div class="space-y-6">
            <!-- CAJA DE AUTH -->
            <section id="authBox" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex justify-between border-b pb-2 mb-4">
                    <button id="tabLogin" onclick="cambiarTabAuth('login')" class="text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1">Iniciar Sesión</button>
                    <button id="tabRegistro" onclick="cambiarTabAuth('registro')" class="text-sm font-medium text-gray-400 pb-1">Crear Cuenta</button>
                </div>
                
                <form id="authForm" class="space-y-3" onsubmit="procesarAuth(event)">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600">Correo Electrónico</label>
                        <input type="email" id="authCorreo" required placeholder="tu.correo@ues.edu.sv" class="w-full p-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600">Contraseña</label>
                        <input type="password" id="authPassword" required class="w-full p-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <button type="submit" id="authBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-2 rounded-lg transition">
                        Entrar a mi Perfil
                    </button>
                </form>
            </section>

            <!-- FORMULARIO DE EDICIÓN DEL GRADUADO -->
            <section id="formSection" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 opacity-40 pointer-events-none transition duration-300">
                <h2 id="formTitle" class="text-base font-bold mb-4 text-gray-950">🔒 Inicia sesión para modificar tus datos</h2>
                <form id="professionalForm" class="space-y-4" onsubmit="actualizarMisDatos(event)">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Nombre Completo</label>
                        <input type="text" id="nombre" required class="mt-1 w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Universidad de la que se graduó</label>
                        <select id="universidad" required class="mt-1 w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white">
                            <option value="Universidad de El Salvador">Universidad de El Salvador</option>
                            <option value="Universidad Autónoma de Santa Ana">Universidad Autónoma de Santa Ana</option>
                            <option value="Universidad extranjera">Universidad extranjera</option>
                        </select>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">Profesión</label>
                            <select id="profesion" required class="mt-1 w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white">
                                <option value="Tecnologo en Fisioterapia">Tecnólogo en Fisioterapia</option>
                                <option value="Licenciado en Fisioterapia">Licenciado en Fisioterapia</option>
                                <option value="Licenciado en Terapia Ocupacional">Licenciado en Terapia Ocupacional</option>
                                <option value="Licenciado en Fisioterapia y Terapia Ocupacional">Ambas Carreras</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">Ubicación (Dept.)</label>
                            <select id="departamento" required class="mt-1 w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white">
                                <option value="Ahuachapán">Ahuachapán</option>
                                <option value="Cabañas">Cabañas</option>
                                <option value="Chalatenango">Chalatenango</option>
                                <option value="Cuscatlán">Cuscatlán</option>
                                <option value="La Libertad">La Libertad</option>
                                <option value="La Paz">La Paz</option>
                                <option value="La Unión">La Unión</option>
                                <option value="Morazán">Morazán</option>
                                <option value="San Miguel">San Miguel</option>
                                <option value="San Salvador">San Salvador</option>
                                <option value="San Vicente">San Vicente</option>
                                <option value="Santa Ana">Santa Ana</option>
                                <option value="Sonsonate">Sonsonate</option>
                                <option value="Usulután">Usulután</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">WhatsApp</label>
                            <input type="text" id="telefono" placeholder="Ej: 7788-9900" class="mt-1 w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">Correo Público</label>
                            <input type="email" id="correo" placeholder="Ej: juan@ues.edu.sv" class="mt-1 w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Estudios Complementarios</label>
                        <input type="text" id="estudios" placeholder="Ej: Maestría, Diplomado..." class="mt-1 w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">Año de Graduación</label>
                            <input type="number" id="anioGraduacion" min="1950" max="2030" required class="mt-1 w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">¿Labora actualmente?</label>
                            <select id="labora" onchange="toggleEmpresa()" class="mt-1 w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white">
                                <option value="no">No</option>
                                <option value="si">Sí</option>
                            </select>
                        </div>
                    </div>

                    <div id="wrapperEmpresa" class="hidden">
                        <label class="block text-sm font-semibold text-gray-700">¿Dónde labora?</label>
                        <input type="text" id="empresa" class="mt-1 w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700">¿Estaría dispuesto/a a un cambio laboral?</label>
                        <select id="cambioLaboral" required class="mt-1 w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white">
                            <option value="no">No</option>
                            <option value="si">Sí, dispuesto/a a escuchar ofertas</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Experiencia Laboral (Resumen)</label>
                        <textarea id="experiencia" rows="3" required class="mt-1 w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none"></textarea>
                    </div>

                    <div class="pt-2 space-y-3">
                        <button type="submit" id="btnGuardarDatos" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition duration-200">
                            🔄 Actualizar mis Datos
                        </button>
                    </div>
                </form>
            </section>
        </div>

        <!-- COLUMNA DERECHA: FILTROS Y DIRECTORIO -->
        <section class="lg:col-span-2 space-y-6">
            
            <!-- PANEL DE FILTROS RESTAURADO -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-4">
                <div class="flex items-center justify-between text-indigo-600 border-b pb-3">
                    <div class="flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <h3 class="text-xs font-bold uppercase tracking-wider text-gray-700">PANEL DE CONTROL PARA EMPRESAS / RECLUTADORES</h3>
                    </div>
                    <button onclick="limpiarFiltros()" class="text-xs text-gray-500 hover:text-indigo-600 font-semibold flex items-center gap-1">
                        ✕ Limpiar Filtros
                    </button>
                </div>

                <!-- CONTROLES DE FILTRADO -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
                    <div>
                        <label class="block text-[11px] font-semibold text-gray-500 mb-1">Palabra clave</label>
                        <input type="text" id="filterKeyword" oninput="filtrarDirectorio()" placeholder="Ej: pediatría..." class="w-full p-2 text-xs border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-gray-500 mb-1">Título Académico</label>
                        <select id="filterTitulo" onchange="filtrarDirectorio()" class="w-full p-2 text-xs border border-gray-200 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            <option value="">Todos los títulos</option>
                            <option value="Tecnologo en Fisioterapia">Tecnólogo en Fisioterapia</option>
                            <option value="Licenciado en Fisioterapia">Licenciado en Fisioterapia</option>
                            <option value="Licenciado en Terapia Ocupacional">Licenciado en Terapia Ocupacional</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-gray-500 mb-1">Universidad</label>
                        <select id="filterUniversidad" onchange="filtrarDirectorio()" class="w-full p-2 text-xs border border-gray-200 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            <option value="">Todas las Univ.</option>
                            <option value="Universidad de El Salvador">Universidad de El Salvador</option>
                            <option value="Universidad Autónoma de Santa Ana">Universidad Autónoma de Santa Ana</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-gray-500 mb-1">Zona (Dept.)</label>
                        <select id="filterZona" onchange="filtrarDirectorio()" class="w-full p-2 text-xs border border-gray-200 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            <option value="">Todo El Salvador</option>
                            <option value="San Salvador">San Salvador</option>
                            <option value="La Libertad">La Libertad</option>
                            <option value="Santa Ana">Santa Ana</option>
                            <option value="San Miguel">San Miguel</option>
                            <option value="Ahuachapán">Ahuachapán</option>
                            <option value="Sonsonate">Sonsonate</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-gray-500 mb-1">Disponibilidad</label>
                        <select id="filterDisponibilidad" onchange="filtrarDirectorio()" class="w-full p-2 text-xs border border-gray-200 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            <option value="">Cualquier estado</option>
                            <option value="disponible">Disponible para contratación</option>
                            <option value="laborando">Laborando actualmente</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- ENCABEZADO RESULTADOS -->
            <div class="flex justify-between items-center flex-wrap gap-2">
                <h2 class="text-xl font-bold text-gray-900">Resultados del Directorio</h2>
                <div class="flex items-center gap-3">
                    <span id="counter" class="bg-indigo-100 text-indigo-800 text-xs font-semibold px-2.5 py-1 rounded-full">0 Candidatos</span>
                </div>
            </div>
            
            <div id="directory" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>
    </main>

    <!-- VENTANA MODAL ACTIVACIÓN POR CORREO OBLIGATORIA -->
    <div id="modalActivarCuenta" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6 space-y-4 text-center">
            <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto text-xl">📩</div>
            <h3 class="text-lg font-bold text-gray-900">Verifica tu Correo</h3>
            <p class="text-xs text-gray-500">Hemos enviado un código de 6 dígitos a <strong id="correoActivacionTexto" class="text-indigo-600"></strong>.</p>
            
            <form onsubmit="confirmarActivacionCodigo(event)" class="space-y-3 pt-2">
                <input type="text" id="codigoActivacionInput" required placeholder="Ingresa los 6 dígitos" maxlength="6" class="w-full p-3 text-center text-xl font-bold tracking-widest border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm py-2.5 rounded-xl transition">Activar mi Cuenta</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://bolsa-fisioterapia-ues.onrender.com/api";
        let authMode = 'login'; 
        let correoPendienteActivacion = "";
        let todosLosCandidatos = [];

        let userToken = localStorage.getItem('ues_token');
        let userProfileId = localStorage.getItem('ues_profesional_id');
        let userCorreo = localStorage.getItem('ues_correo');

        document.addEventListener('DOMContentLoaded', () => {
            cargarDirectorio();

            if (userToken && userToken !== 'undefined' && userToken !== 'null') {
                mostrarEstadoSesion(userCorreo);
                cargarPerfilPropio();
            }
        });

        async function cargarDirectorio() {
            try {
                const res = await fetch(`${API_URL}/profesionales`);
                if (!res.ok) return;
                todosLosCandidatos = await res.json();
                filtrarDirectorio();
            } catch (e) {
                console.error("Error al cargar directorio:", e);
            }
        }

        function filtrarDirectorio() {
            const kw = document.getElementById('filterKeyword').value.toLowerCase();
            const titulo = document.getElementById('filterTitulo').value;
            const univ = document.getElementById('filterUniversidad').value;
            const zona = document.getElementById('filterZona').value;
            const disp = document.getElementById('filterDisponibilidad').value;

            const filtrados = todosLosCandidatos.filter(p => {
                const matchKw = !kw || (p.nombre && p.nombre.toLowerCase().includes(kw)) || (p.experiencia && p.experiencia.toLowerCase().includes(kw)) || (p.estudios && p.estudios.toLowerCase().includes(kw));
                const matchTitulo = !titulo || p.profesion === titulo || p.carrera === titulo;
                const matchUniv = !univ || p.universidad === univ;
                const matchZona = !zona || p.departamento === zona;
                const matchDisp = !disp || (disp === 'laborando' ? p.labora : !p.labora);

                return matchKw && matchTitulo && matchUniv && matchZona && matchDisp;
            });

            renderizarDirectorio(filtrados);
        }

        function limpiarFiltros() {
            document.getElementById('filterKeyword').value = '';
            document.getElementById('filterTitulo').value = '';
            document.getElementById('filterUniversidad').value = '';
            document.getElementById('filterZona').value = '';
            document.getElementById('filterDisponibilidad').value = '';
            filtrarDirectorio();
        }

        function renderizarDirectorio(lista) {
            const container = document.getElementById('directory');
            const counter = document.getElementById('counter');
            if (!container) return;

            if (counter) counter.textContent = `${lista.length} Candidatos`;

            if (lista.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400 font-medium">No se encontraron profesionales con estos criterios.</div>`;
                return;
            }

            container.innerHTML = lista.map(p => `
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between space-y-3">
                    <div class="space-y-1">
                        <div class="flex items-center justify-between">
                            <h3 class="font-bold text-gray-900 text-base">${p.nombre}</h3>
                            <span class="text-[10px] bg-indigo-100 text-indigo-700 font-bold px-2 py-0.5 rounded-full">${p.profesion || p.carrera || 'Fisioterapia'}</span>
                        </div>
                        <p class="text-xs text-gray-500">
                            📍 <strong>${p.departamento || 'El Salvador'}</strong> | 🎓 ${p.universidad || 'UES'}
                        </p>
                    </div>
                    <div class="text-xs text-gray-600 bg-gray-50 p-3 rounded-lg space-y-1">
                        <p><strong>Contacto:</strong> ${p.contacto || p.telefono || p.correo || 'N/A'}</p>
                        <p><strong>Estudios:</strong> ${p.estudios || 'Graduado UES'}</p>
                        <p><strong>Experiencia:</strong> ${p.experiencia || 'Sin detalle'}</p>
                        <p class="pt-1 text-[11px] font-semibold ${p.labora ? 'text-amber-600' : 'text-emerald-600'}">
                            ${p.labora ? '💼 Laborando actualmente' : '✅ Disponible para contratación'}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        function cambiarTabAuth(mode) {
            authMode = mode;
            const tabL = document.getElementById('tabLogin');
            const tabR = document.getElementById('tabRegistro');
            const btn = document.getElementById('authBtn');
            
            if(mode === 'login') {
                tabL.className = "text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1";
                tabR.className = "text-sm font-medium text-gray-400 pb-1";
                btn.textContent = "Entrar a mi Perfil";
            } else {
                tabR.className = "text-sm font-bold text-indigo-600 border-b-2 border-indigo-600 pb-1";
                tabL.className = "text-sm font-medium text-gray-400 pb-1";
                btn.textContent = "Registrar Nueva Cuenta";
            }
        }

        async function procesarAuth(e) {
            e.preventDefault();
            const correo = document.getElementById('authCorreo').value;
            const password = document.getElementById('authPassword').value;
            const url = authMode === 'login' ? `${API_URL}/auth/login` : `${API_URL}/auth/registrar`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, password })
                });
                const data = await response.json();
                
                if (!response.ok) {
                    let errText = typeof data.detail === 'string' ? data.detail : "Error de autenticación";
                    if (errText.includes("aún no está verificado") || errText.includes("código")) {
                        correoPendienteActivacion = correo;
                        abrirModalActivacion();
                    } else {
                        alert(errText);
                    }
                    return;
                }
                
                if (authMode === 'registro') {
                    correoPendienteActivacion = correo;
                    abrirModalActivacion();
                } else {
                    userToken = data.access_token || data.token;
                    userProfileId = data.profesional_id;
                    userCorreo = correo;

                    if (userToken) localStorage.setItem('ues_token', userToken);
                    if (userProfileId) localStorage.setItem('ues_profesional_id', userProfileId);
                    if (correo) localStorage.setItem('ues_correo', correo);
                    
                    mostrarEstadoSesion(correo);
                    await cargarPerfilPropio();
                }
            } catch (err) {
                alert("Error de conexión al servidor.");
            }
        }

        function mostrarEstadoSesion(correo) {
            document.getElementById('authBox').innerHTML = `
                <div class="text-center py-2">
                    <p class="text-sm text-green-600 font-bold">✓ Sesión Iniciada</p>
                    <p class="text-xs text-gray-500 mb-2">${correo || ''}</p>
                    <button onclick="cerrarSesion()" class="text-xs text-red-500 underline font-semibold">Cerrar Sesión</button>
                </div>
            `;
            document.getElementById('formSection').classList.remove('opacity-40', 'pointer-events-none');
            document.getElementById('formTitle').textContent = "Modificar mis Datos Profesionales";
        }

        function cerrarSesion() {
            localStorage.clear();
            location.reload();
        }

        async function cargarPerfilPropio() {
            if (!userToken) return;

            try {
                const res = await fetch(`${API_URL}/profesionales/me`, {
                    headers: { 'Authorization': `Bearer ${userToken}` }
                });

                if (res.ok) {
                    const profile = await res.json();
                    if (profile.id) {
                        userProfileId = profile.id;
                        localStorage.setItem('ues_profesional_id', profile.id);
                    }
                    if (profile.nombre) document.getElementById('nombre').value = profile.nombre;
                    if (profile.universidad) document.getElementById('universidad').value = profile.universidad;
                    if (profile.profesion || profile.carrera) document.getElementById('profesion').value = profile.profesion || profile.carrera;
                    if (profile.departamento) document.getElementById('departamento').value = profile.departamento;
                    if (profile.telefono) document.getElementById('telefono').value = profile.telefono;
                    if (profile.correo) document.getElementById('correo').value = profile.correo;
                    if (profile.estudios) document.getElementById('estudios').value = profile.estudios;
                    if (profile.graduacion || profile.anio_graduacion) document.getElementById('anioGraduacion').value = profile.graduacion || profile.anio_graduacion;
                    if (profile.labora !== undefined) {
                        document.getElementById('labora').value = profile.labora ? 'si' : 'no';
                        toggleEmpresa();
                    }
                    if (profile.empresa) document.getElementById('empresa').value = profile.empresa;
                    if (profile.cambio_laboral !== undefined) document.getElementById('cambioLaboral').value = profile.cambio_laboral ? 'si' : 'no';
                    if (profile.experiencia) document.getElementById('experiencia').value = profile.experiencia;
                }
            } catch (e) {
                console.log("Cargando datos del perfil...");
            }
        }

        async function actualizarMisDatos(e) {
            e.preventDefault();

            if (!userToken) {
                alert("Tu sesión ha vencido. Vuelve a iniciar sesión.");
                cerrarSesion();
                return;
            }

            const targetUrl = userProfileId ? `${API_URL}/profesionales/${userProfileId}` : `${API_URL}/profesionales`;
            const targetMethod = userProfileId ? 'PUT' : 'POST';
            const anioGradVal = parseInt(document.getElementById('anioGraduacion').value) || null;

            const payload = {
                nombre: document.getElementById('nombre').value,
                universidad: document.getElementById('universidad').value,
                profesion: document.getElementById('profesion').value,
                carrera: document.getElementById('profesion').value,
                departamento: document.getElementById('departamento').value,
                contacto: document.getElementById('telefono').value || document.getElementById('correo').value,
                telefono: document.getElementById('telefono').value,
                correo: document.getElementById('correo').value,
                estudios: document.getElementById('estudios').value,
                graduacion: anioGradVal,
                anio_graduacion: anioGradVal,
                labora: document.getElementById('labora').value === 'si',
                empresa: document.getElementById('empresa').value,
                cambio_laboral: document.getElementById('cambioLaboral').value === 'si',
                experiencia: document.getElementById('experiencia').value
            };

            const btn = document.getElementById('btnGuardarDatos');
            btn.disabled = true;
            btn.textContent = "Guardando...";

            try {
                const response = await fetch(targetUrl, {
                    method: targetMethod,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${userToken}`
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    alert("Error al guardar los datos.");
                    return;
                }

                alert("¡Tus datos se han guardado exitosamente!");
                await cargarDirectorio();

            } catch (err) {
                alert("Error de conexión al servidor.");
            } finally {
                btn.disabled = false;
                btn.textContent = "🔄 Actualizar mis Datos";
            }
        }

        function toggleEmpresa() {
            const labora = document.getElementById('labora').value;
            const wrapper = document.getElementById('wrapperEmpresa');
            if (labora === 'si') wrapper.classList.remove('hidden');
            else wrapper.classList.add('hidden');
        }

        function abrirModalActivacion() {
            document.getElementById('correoActivacionTexto').textContent = correoPendienteActivacion;
            document.getElementById('codigoActivacionInput').value = '';
            document.getElementById('modalActivarCuenta').classList.remove('hidden');
        }

        function cerrarModalActivacion() {
            document.getElementById('modalActivarCuenta').classList.add('hidden');
        }

        async function confirmarActivacionCodigo(e) {
            e.preventDefault();
            const codigo = document.getElementById('codigoActivacionInput').value;

            try {
                const res = await fetch(`${API_URL}/auth/activar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo: correoPendienteActivacion, codigo })
                });
                const data = await res.json();

                if (!res.ok) {
                    alert(data.detail || "Código de activación incorrecto.");
                    return;
                }

                alert("¡Cuenta activada con éxito! Ya puedes iniciar sesión.");
                cerrarModalActivacion();
                cambiarTabAuth('login');
            } catch (err) {
                alert("Error de conexión.");
            }
        }
    </script>
</body>
</html>
